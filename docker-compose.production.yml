version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pesantren-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pesantren_db}
      POSTGRES_USER: ${DB_USER:-pesantren}
      POSTGRES_PASSWORD: ${DB_PASS:-Pesantren2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/complete_schema.sql:/docker-entrypoint-initdb.d/complete_schema.sql
    ports:
      - "5432:5432"
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pesantren}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pesantren-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-RedisPesantren2026!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: pesantren-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # API Server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pesantren-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pesantren_db}
      DB_USER: ${DB_USER:-pesantren}
      DB_PASS: ${DB_PASS:-Pesantren2026!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-RedisPesantren2026!}
      JWT_SECRET: ${JWT_SECRET:-JwtSecretPesantren2026SecureKey}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Panel (Next.js)
  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pesantren-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXT_PUBLIC_APP_NAME: "Sistem Informasi Pesantren"
    ports:
      - "3001:3000"
    depends_on:
      - api
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pesantren-nginx
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deploy/nginx/sites/pesantren.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - admin
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: pesantren-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - pesantren-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: pesantren-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - pesantren-network

  # Backup Service
  backup:
    image: alpine:latest
    container_name: pesantren-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/backup.sh
      - backup_data:/backups
      - postgres_data:/var/lib/postgresql/data:ro
      - uploads:/uploads:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-pesantren_db}
      DB_USER: ${DB_USER:-pesantren}
      DB_PASS: ${DB_PASS:-Pesantren2026!}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
    networks:
      - pesantren-network
    command: >
      sh -c "
      chmod +x /backup.sh &&
      echo '0 2 * * * /backup.sh' > /etc/crontabs/root &&
      crond -f
      "

  # Mailhog for Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: pesantren-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - pesantren-network

networks:
  pesantren-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads:
  logs:
  prometheus_data:
  grafana_data:
  backup_data: